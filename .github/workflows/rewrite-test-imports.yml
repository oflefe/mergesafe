name: Rewrite moved test imports

on:
  pull_request:

permissions:
  contents: write

jobs:
  rewrite:
    if: github.head_ref == 'agent/separate-tests'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Rewrite imports and remove workarounds
        run: |
          node <<'NODE'
          const fs = require('node:fs');
          const path = require('node:path');

          const repositoryRoot = process.cwd();
          const apiRoot = path.join(repositoryRoot, 'apps', 'api');
          const sourceRoot = path.join(apiRoot, 'src');
          const unitRoot = path.join(apiRoot, 'tests', 'unit');
          const testsRoot = path.join(apiRoot, 'tests');

          function walk(directory) {
            return fs.readdirSync(directory, { withFileTypes: true }).flatMap((entry) => {
              const entryPath = path.join(directory, entry.name);
              return entry.isDirectory() ? walk(entryPath) : [entryPath];
            });
          }

          function resolveModule(basePath) {
            const candidates = [
              basePath,
              `${basePath}.ts`,
              `${basePath}.tsx`,
              `${basePath}.js`,
              `${basePath}.cjs`,
              `${basePath}.json`,
              path.join(basePath, 'index.ts'),
              path.join(basePath, 'index.tsx'),
              path.join(basePath, 'index.js'),
            ];
            return candidates.find((candidate) => fs.existsSync(candidate));
          }

          function stripExtension(filePath) {
            return filePath.replace(/\.(?:ts|tsx|js|cjs|json)$/, '');
          }

          function toSpecifier(fromFile, targetPath) {
            let relative = path.relative(path.dirname(fromFile), stripExtension(targetPath));
            relative = relative.split(path.sep).join('/');
            return relative.startsWith('.') ? relative : `./${relative}`;
          }

          function rewriteSpecifier(testFile, specifier) {
            const relativeTestPath = path.relative(unitRoot, testFile);
            const mirroredSourceDirectory = path.join(sourceRoot, path.dirname(relativeTestPath));
            const originalTarget = path.resolve(mirroredSourceDirectory, specifier);

            const sourceTarget = resolveModule(originalTarget);
            if (sourceTarget) {
              return toSpecifier(testFile, sourceTarget);
            }

            const legacyTestRoot = `${path.join(apiRoot, 'test')}${path.sep}`;
            if (originalTarget.startsWith(legacyTestRoot)) {
              const movedTarget = resolveModule(
                path.join(testsRoot, originalTarget.slice(legacyTestRoot.length)),
              );
              if (movedTarget) {
                return toSpecifier(testFile, movedTarget);
              }
            }

            const currentTarget = resolveModule(path.resolve(path.dirname(testFile), specifier));
            if (currentTarget && currentTarget.startsWith(testsRoot)) {
              return toSpecifier(testFile, currentTarget);
            }

            throw new Error(
              `Could not resolve ${specifier} imported by ${path.relative(repositoryRoot, testFile)}`,
            );
          }

          const importPattern = /((?:from\s+|import\s*\(\s*|import\s+|jest\.(?:mock|unmock|requireActual)\(\s*)["'])(\.[^"']+)(["'])/g;

          for (const testFile of walk(unitRoot).filter((file) => file.endsWith('.spec.ts'))) {
            const original = fs.readFileSync(testFile, 'utf8');
            const rewritten = original.replace(
              importPattern,
              (_match, prefix, specifier, suffix) =>
                `${prefix}${rewriteSpecifier(testFile, specifier)}${suffix}`,
            );
            fs.writeFileSync(testFile, rewritten);
          }

          const jestConfigPath = path.join(apiRoot, 'jest.config.cjs');
          fs.writeFileSync(
            jestConfigPath,
            fs.readFileSync(jestConfigPath, 'utf8').replace(
              "  resolver: '<rootDir>/tests/jest-resolver.cjs',\n",
              '',
            ),
          );

          const tsconfigPath = path.join(apiRoot, 'tsconfig.json');
          const tsconfig = JSON.parse(fs.readFileSync(tsconfigPath, 'utf8'));
          delete tsconfig.compilerOptions.rootDirs;
          fs.writeFileSync(tsconfigPath, `${JSON.stringify(tsconfig, null, 2)}\n`);

          for (const obsoletePath of [
            path.join(apiRoot, 'tests', 'jest-resolver.cjs'),
            path.join(apiRoot, 'tests', 'unit', 'fixtures'),
            path.join(apiRoot, 'tests', 'unit', 'helpers'),
            path.join(apiRoot, 'tests', 'test'),
            path.join(repositoryRoot, '.github', 'workflows', 'rewrite-test-imports.yml'),
          ]) {
            fs.rmSync(obsoletePath, { recursive: true, force: true });
          }
          NODE

      - name: Validate
        run: |
          npm ci
          npm run lint
          npm run typecheck
          npm run test:unit
          npm run test:integration
          npm run build

      - name: Commit corrected layout
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -A
          git commit -m "refactor: use explicit test imports"
          git push origin HEAD:${{ github.head_ref }}
