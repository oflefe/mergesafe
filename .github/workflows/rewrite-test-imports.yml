name: Rewrite moved test imports

on:
  pull_request:

permissions:
  contents: write

jobs:
  rewrite:
    if: github.head_ref == 'verification-decision-transparency'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0

      - name: Rewrite imports and remove workarounds
        run: |
          node <<'NODE'
          const fs = require('node:fs');
          const path = require('node:path');

          const repositoryRoot = process.cwd();
          const apiRoot = path.join(repositoryRoot, 'apps', 'api');
          const sourceRoot = path.join(apiRoot, 'src');
          const legacyTestRoot = path.join(apiRoot, 'test');
          const testsRoot = path.join(apiRoot, 'tests');
          const unitRoot = path.join(testsRoot, 'unit');

          function walk(directory) {
            return fs.readdirSync(directory, { withFileTypes: true }).flatMap((entry) => {
              const entryPath = path.join(directory, entry.name);
              return entry.isDirectory() ? walk(entryPath) : [entryPath];
            });
          }

          function toSpecifier(fromFile, targetPath) {
            let relative = path.relative(path.dirname(fromFile), targetPath);
            relative = relative.split(path.sep).join('/');
            return relative.startsWith('.') ? relative : `./${relative}`;
          }

          function rewriteSpecifier(testFile, specifier) {
            const relativeTestPath = path.relative(unitRoot, testFile);
            const mirroredSourceDirectory = path.join(sourceRoot, path.dirname(relativeTestPath));
            const originalTarget = path.resolve(mirroredSourceDirectory, specifier);

            if (originalTarget === sourceRoot || originalTarget.startsWith(`${sourceRoot}${path.sep}`)) {
              return toSpecifier(testFile, originalTarget);
            }

            if (
              originalTarget === legacyTestRoot ||
              originalTarget.startsWith(`${legacyTestRoot}${path.sep}`)
            ) {
              return toSpecifier(
                testFile,
                path.join(testsRoot, path.relative(legacyTestRoot, originalTarget)),
              );
            }

            return specifier;
          }

          const importPattern = /((?:from\s+|import\s*\(\s*|import\s+|jest\.(?:mock|unmock|requireActual)\(\s*)["'])(\.[^"']+)(["'])/g;

          for (const testFile of walk(unitRoot).filter((file) => file.endsWith('.spec.ts'))) {
            const original = fs.readFileSync(testFile, 'utf8');
            fs.writeFileSync(
              testFile,
              original.replace(
                importPattern,
                (_match, prefix, specifier, suffix) =>
                  `${prefix}${rewriteSpecifier(testFile, specifier)}${suffix}`,
              ),
            );
          }

          const jestConfigPath = path.join(apiRoot, 'jest.config.cjs');
          fs.writeFileSync(
            jestConfigPath,
            fs.readFileSync(jestConfigPath, 'utf8').replace(
              "  resolver: '<rootDir>/tests/jest-resolver.cjs',\n",
              '',
            ),
          );

          const tsconfigPath = path.join(apiRoot, 'tsconfig.json');
          const tsconfig = JSON.parse(fs.readFileSync(tsconfigPath, 'utf8'));
          delete tsconfig.compilerOptions.rootDirs;
          fs.writeFileSync(tsconfigPath, `${JSON.stringify(tsconfig, null, 2)}\n`);

          for (const obsoletePath of [
            path.join(testsRoot, 'jest-resolver.cjs'),
            path.join(unitRoot, 'fixtures'),
            path.join(unitRoot, 'helpers'),
            path.join(testsRoot, 'test'),
            path.join(repositoryRoot, '.github', 'workflows', 'rewrite-test-imports.yml'),
          ]) {
            fs.rmSync(obsoletePath, { recursive: true, force: true });
          }
          NODE

      - name: Commit corrected layout
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -A
          git commit -m "refactor: use explicit test imports"
          git push origin HEAD:${{ github.head_ref }}
