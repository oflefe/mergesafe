name: Sync stacked base

on:
  push:
    branches:
      - agent/pr-type-classifier

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/pr-type-classifier
          fetch-depth: 0

      - name: Merge updated decision-transparency base
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git fetch origin verification-decision-transparency
          git merge -X ours origin/verification-decision-transparency --no-edit
          rm .github/workflows/sync-stack.yml
          git add -A
          git commit --amend --no-edit
          git push origin HEAD:agent/pr-type-classifier
